<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,minimal-ui,minimum-scale=1">
  <title>Castle Clashers — dev</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden;
                 touch-action:none; -webkit-user-select:none; user-select:none; }
    #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
    canvas { display:block; touch-action:none; max-width:100vw; max-height:100vh;
             aspect-ratio:540/960; background:#0a0a0a; }
    #devbar, #devbar-hp { position:fixed; left:8px; right:8px; display:flex; gap:8px; flex-wrap:wrap;
                          font:12px/1.2 sans-serif; color:#fff; pointer-events:auto; z-index:10; }
    #devbar    { top:8px; }
    #devbar-hp { top:42px; }
    #devbar button, #devbar-hp button { background:#222; color:#fff; border:1px solid #555; border-radius:4px;
                                        padding:4px 8px; cursor:pointer; font:inherit; }
    #devbar button:hover, #devbar-hp button:hover { background:#333; }
  </style>
</head>
<body>
  <div id="devbar">
    <button data-state="EXTERIOR_OBSERVE">EXT_OBS</button>
    <button data-state="INTERIOR_AIM">INT_AIM</button>
    <button data-state="EXTERIOR_RESOLVE">EXT_RES</button>
    <button data-hp="100">hp100</button>
    <button data-hp="65">hp65</button>
    <button data-hp="35">hp35</button>
    <button data-hp="17">hp17</button>
    <span id="state-readout" style="margin-left:auto;align-self:center;"></span>
  </div>
  <div id="devbar-hp">
    <button data-hp="self"  data-delta="-25">blue −25</button>
    <button data-hp="self"  data-delta="+25">blue +25</button>
    <button data-hp="enemy" data-delta="-25">red −25</button>
    <button data-hp="enemy" data-delta="+25">red +25</button>
    <button data-hp="reset">reset 100/100</button>
    <span id="hp-readout" style="margin-left:auto;align-self:center;"></span>
  </div>
  <div id="wrap"><canvas id="g" width="540" height="960"></canvas></div>

  <!-- VSDK shim — same shape as castle-clasher-v2/playable.html, kept so production wiring is identical. -->
  <script>
  (function(){
    const subs = {};
    const playable = {
      win() { console.log('[VSDK] win'); _emit('win'); },
      lose() { console.log('[VSDK] lose'); _emit('lose'); },
      redirectToInstallPage() { console.log('[VSDK] redirectToInstallPage'); _emit('redirect'); },
      on(event, cb) { (subs[event] = subs[event] || []).push(cb); }
    };
    function _emit(ev) { (subs[ev] || []).forEach(cb => { try { cb(); } catch(e){ console.error(e); } }); }
    Object.defineProperty(window, 'Voodoo', { value: { playable }, writable:false, enumerable:true, configurable:false });
  })();
  </script>

  <script type="module">
    import { mount as mountInterior } from './scene_interior/index.js';
    import { mount as mountExterior } from './scene_exterior/index.js';
    import { start, subscribe, _devForceState } from './shared/scene_manager.js';
    import { state, applyDamageToSelf, applyDamageToEnemy } from './shared/state.js';

    const canvas = document.getElementById('g');
    mountInterior(canvas);
    mountExterior(canvas);

    // Dev-only: expose state for console poking (window.state.hp_self_pct = 30, etc.)
    window.state = state;

    const readout   = document.getElementById('state-readout');
    const hpReadout = document.getElementById('hp-readout');
    const refreshHp = () => { hpReadout.textContent = `blue ${state.hp_self_pct}%   red ${state.hp_enemy_pct}%`; };
    subscribe((s) => { readout.textContent = s; refreshHp(); });
    refreshHp();

    document.querySelectorAll('#devbar button[data-state]').forEach(btn => {
      btn.addEventListener('click', () => _devForceState(btn.dataset.state));
    });
    document.querySelectorAll('#devbar button[data-hp]').forEach(btn => {
      btn.addEventListener('click', () => { state.hp_self_pct = +btn.dataset.hp; });
    });

    document.querySelectorAll('#devbar-hp button').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.hp === 'reset') { state.hp_self_pct = 100; state.hp_enemy_pct = 100; }
        else if (btn.dataset.hp === 'self')  applyDamageToSelf(parseInt(btn.dataset.delta, 10));
        else if (btn.dataset.hp === 'enemy') applyDamageToEnemy(parseInt(btn.dataset.delta, 10));
        refreshHp();
      });
    });

    start();
    _devForceState('INTERIOR_AIM'); // dev: jump straight into our scene
  </script>
</body>
</html>
