<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,minimal-ui,minimum-scale=1">
<title>Castle Clashers</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#4ab0ff;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
canvas{display:block;touch-action:none;max-width:100vw;max-height:100vh;aspect-ratio:540/960;background:#0a0a0a;}
#splash{position:fixed;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#5cc0ff 0%,#2e8de0 100%);transition:opacity .35s ease;will-change:opacity;}
#splash.hide{opacity:0;pointer-events:none;}
#sIcon{width:38vw;max-width:200px;aspect-ratio:1;border-radius:22%;background:linear-gradient(160deg,#ffd97a 0%,#ff8a3d 100%);box-shadow:0 10px 28px rgba(0,0,0,.28),inset 0 -8px 0 rgba(0,0,0,.10);display:flex;align-items:center;justify-content:center;animation:sP 1.4s ease-in-out infinite;}
#sIcon svg{width:72%;height:72%;filter:drop-shadow(0 3px 0 rgba(0,0,0,.18));}
#sBar{margin-top:8vh;width:54vw;max-width:280px;height:14px;border-radius:8px;background:rgba(255,255,255,.28);overflow:hidden;border:2px solid #fff;box-sizing:border-box;}
#sFill{height:100%;width:0;background:#fff;border-radius:6px;animation:sF 1.6s cubic-bezier(.4,.1,.3,1) forwards;}
#sPct{margin-top:14px;color:#fff;font-weight:800;font-size:22px;letter-spacing:.5px;text-shadow:0 2px 0 rgba(0,0,0,.18);font-variant-numeric:tabular-nums;}
@keyframes sP{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes sF{0%{width:0}70%{width:88%}100%{width:96%}}
</style>
</head>
<body>
<div id="splash" aria-hidden="true">
<div id="sIcon"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path fill="#7a4a22" d="M8 52h48v6H8z"/><path fill="#a86a32" d="M8 26h8v26H8zm20 0h8v26h-8zm20 0h8v26h-8z"/><path fill="#a86a32" d="M16 36h32v16H16z"/><path fill="#7a4a22" d="M28 40h8v12h-8z"/><path fill="#a86a32" d="M8 22l4-6 4 6zm20 0l4-6 4 6zm20 0l4-6 4 6z"/><path fill="#e84545" d="M11 8h2v10h-2zm20 0h2v10h-2zm20 0h2v10h-2z"/><path fill="#e84545" d="M13 8l4 2-4 2zm20 0l4 2-4 2zm20 0l4 2-4 2z"/></svg></div>
<div id="sBar"><div id="sFill"></div></div>
<div id="sPct">0%</div>
</div>
<script>
(function(){
  var splash=document.getElementById('splash'),pct=document.getElementById('sPct'),fill=document.getElementById('sFill');
  var t0=performance.now(),hidden=false,n=0;
  function tick(){
    if(hidden)return;
    var e=performance.now()-t0,p=Math.min(96,Math.round(e/16));
    if(p>n){n=p;pct.textContent=p+'%';}
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  function hide(){
    if(hidden)return;hidden=true;
    pct.textContent='100%';fill.style.width='100%';
    setTimeout(function(){splash.classList.add('hide');setTimeout(function(){splash.remove();},400);},120);
  }
  window.addEventListener('playable:ready',hide,{once:true});
  // Fallback: sample canvas pixel; if any non-bg pixel rendered, the game is live.
  var c=null,ctx=null,tries=0;
  var iv=setInterval(function(){
    tries++;
    if(!c){c=document.getElementById('g');if(c){try{ctx=c.getContext('2d',{willReadFrequently:true});}catch(e){}}}
    if(ctx){
      try{
        var d=ctx.getImageData(c.width/2,c.height/2,1,1).data;
        // background canvas is #0a0a0a (10,10,10). Anything else means a frame painted.
        if(d[0]>20||d[1]>20||d[2]>20){clearInterval(iv);hide();return;}
      }catch(e){}
    }
    if(tries>120){clearInterval(iv);hide();} // hard cap ~6s
  },50);
})();
</script>
<div id="wrap"><canvas id="g" width="540" height="960"></canvas></div>

</html>
