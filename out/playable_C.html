<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Castle Clashers — Playable</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden;
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               user-select: none; -webkit-user-select: none; touch-action: none; }
  #stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; touch-action: none; background: #87CEEB; }
  #endcard {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    background: rgba(0,0,0,0.55); color: #fff; text-align: center; padding: 32px; z-index: 10;
  }
  #endcard.show { display: flex; }
  #endcard h1 { font-size: 30px; margin: 0; color: #F8E71C;
                text-shadow: 0 4px 0 #000, 0 6px 16px rgba(0,0,0,0.7); }
  #endcard .logo { font-size: 42px; font-weight: 900; letter-spacing: 2px;
                   color: #F8E71C; text-shadow: 0 4px 0 #4A2A0A, 0 8px 16px rgba(0,0,0,0.6); }
  #cta { background: linear-gradient(180deg,#7ED321,#4A8E10); color: #fff; border: none;
         padding: 18px 48px; font-size: 24px; font-weight: 900; border-radius: 14px;
         box-shadow: 0 6px 0 #2A5908, 0 10px 20px rgba(0,0,0,0.4); cursor: pointer;
         letter-spacing: 1.5px; }
  #cta:active { transform: translateY(4px); box-shadow: 0 2px 0 #2A5908; }
  #hint { position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
          color: #fff; font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
          text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 5;
          background: rgba(0,0,0,0.35); padding: 6px 12px; border-radius: 12px; }
  #loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; background: #000; z-index: 20; }
</style>
</head>
<body>
<div id="loader">Loading…</div>
<div id="stage">
  <canvas id="game" width="375" height="667"></canvas>
  <div id="hint">Drag from the skeleton — hit the glowing weak point!</div>
</div>
<div id="endcard">
  <div class="logo">CASTLE CLASHERS</div>
  <h1>Master Total Destruction!</h1>
  <button id="cta">PLAY NOW</button>
</div>

<script>
(() => {
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function fit() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', fit); fit();

// ---------- Asset loading ----------
const ASSETS = {
  bg:        'assets/Background.png',
  blue:      'assets/Blue_Castle.png',
  red:       'assets/Red_Castle.png',
  skeleton:  'assets/Character_Skeleton.png',
  weapon:    'assets/Weapon_1.png',
  rocket:    'assets/Projectile_1.png',
};
const SOUNDS = {
  music: 'assets/Music.ogg',
  sfx:   'assets/Sfx.wav',
};
const img = {};
const snd = {};

function load() {
  const ip = Object.entries(ASSETS).map(([k, src]) => new Promise((res, rej) => {
    const i = new Image(); i.onload = () => { img[k] = i; res(); };
    i.onerror = rej; i.src = src;
  }));
  const sp = Object.entries(SOUNDS).map(([k, src]) => new Promise((res) => {
    const a = new Audio(); a.src = src; a.preload = 'auto';
    a.oncanplaythrough = () => { snd[k] = a; res(); };
    a.onerror = () => res(); // sound is optional
  }));
  return Promise.all([...ip, ...sp]);
}

// ---------- Game state ----------
const GROUND_Y = H - 70;
const GRAVITY = 0.45;

const player = { cx: 80, by: GROUND_Y, w: 130, h: 170 };
const enemy  = { cx: W - 90, by: GROUND_Y, w: 140, h: 185, destroyed: false };
const weakPoint = { x: enemy.cx - 30, y: enemy.by - 25, r: 20 };
const unit = { x: player.cx + 25, y: player.by - 95, r: 22 };

let drag = null;
let projectile = null;
let particles = [];
let chunks = [];
let phase = 'aim'; // aim | fly | win | miss | done
let winTimer = 0;
let firstShot = true;
let tutT = 0;
let musicStarted = false;

// ---------- Audio helpers ----------
function playSfx() {
  if (!snd.sfx) return;
  try { snd.sfx.currentTime = 0; snd.sfx.play().catch(() => {}); } catch(e){}
}
function startMusic() {
  if (musicStarted || !snd.music) return;
  musicStarted = true;
  snd.music.loop = true; snd.music.volume = 0.4;
  snd.music.play().catch(() => { musicStarted = false; });
}

// ---------- Input ----------
function pt(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) * (W / r.width),
           y: (t.clientY - r.top) * (H / r.height) };
}
function down(e) {
  startMusic();
  if (phase !== 'aim') return;
  const p = pt(e);
  if (Math.hypot(p.x - unit.x, p.y - unit.y) < 70) {
    drag = { sx: unit.x, sy: unit.y, x: p.x, y: p.y };
  }
  e.preventDefault();
}
function move(e) {
  if (!drag) return;
  const p = pt(e); drag.x = p.x; drag.y = p.y;
  e.preventDefault();
}
function up(e) {
  if (!drag) return;
  const dx = drag.sx - drag.x, dy = drag.sy - drag.y;
  const power = Math.min(Math.hypot(dx, dy) * 0.20, 24);
  if (power < 4) { drag = null; return; }
  const ang = Math.atan2(dy, dx);
  projectile = {
    x: unit.x + 25, y: unit.y - 5,
    vx: Math.cos(ang) * power, vy: Math.sin(ang) * power
  };
  drag = null;
  phase = 'fly';
  firstShot = false;
  playSfx();
  e.preventDefault();
}
canvas.addEventListener('mousedown', down);
canvas.addEventListener('mousemove', move);
window.addEventListener('mouseup', up);
canvas.addEventListener('touchstart', down, { passive: false });
canvas.addEventListener('touchmove', move, { passive: false });
canvas.addEventListener('touchend', up, { passive: false });

// ---------- Destruction ----------
function spawnParticles(x, y, n, opts = {}) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (opts.speedMin || 1) + Math.random() * ((opts.speedMax || 6) - (opts.speedMin || 1));
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - (opts.lift || 2),
      life: 30 + Math.random() * 30, max: 60,
      r: 2 + Math.random() * (opts.radius || 5),
      color: opts.colors ? opts.colors[Math.floor(Math.random() * opts.colors.length)] : '#FFA500',
      g: opts.gravity != null ? opts.gravity : 0.18,
    });
  }
}
function startCollapse() {
  // Slice the red castle sprite into chunks, each becomes a physics piece.
  const cols = 4, rows = 6;
  const srcW = img.red.width, srcH = img.red.height;
  const sw = srcW / cols, sh = srcH / rows;
  const dx0 = enemy.cx - enemy.w / 2;
  const dy0 = enemy.by - enemy.h;
  const cw = enemy.w / cols, ch = enemy.h / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      chunks.push({
        sx: c * sw, sy: r * sh, sw, sh,
        x: dx0 + c * cw + cw / 2,
        y: dy0 + r * ch + ch / 2,
        w: cw, h: ch,
        vx: (Math.random() - 0.5) * 6,
        vy: -3 - Math.random() * 5 - (rows - r) * 0.4,
        rot: 0, vr: (Math.random() - 0.5) * 0.22,
        delay: Math.floor(r * 3 + Math.random() * 8),
      });
    }
  }
  spawnParticles(weakPoint.x, weakPoint.y, 70, {
    colors: ['#F8E71C','#FFA500','#D0021B','#fff'],
    speedMin: 2, speedMax: 10, radius: 7, lift: 3
  });
  setTimeout(() => spawnParticles(enemy.cx, enemy.by - enemy.h / 2, 50, {
    colors: ['#444','#666','#222','#888'],
    speedMin: 1, speedMax: 5, radius: 8
  }), 200);
  enemy.destroyed = true;
  playSfx();
}

// ---------- Drawing ----------
function drawBackground() {
  // Cover the canvas, anchored bottom
  const im = img.bg;
  const scale = Math.max(W / im.width, H / im.height);
  const dw = im.width * scale, dh = im.height * scale;
  ctx.drawImage(im, (W - dw) / 2, H - dh, dw, dh);
}
function drawCastle(c, sprite, isEnemy) {
  if (isEnemy && enemy.destroyed) return;
  const dx = c.cx - c.w / 2, dy = c.by - c.h;
  ctx.drawImage(sprite, dx, dy, c.w, c.h);
}
function drawWeakPoint() {
  if (enemy.destroyed) return;
  const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 200);
  const grd = ctx.createRadialGradient(weakPoint.x, weakPoint.y, 2, weakPoint.x, weakPoint.y, weakPoint.r * 2.4);
  grd.addColorStop(0,   `rgba(248,231,28,${pulse})`);
  grd.addColorStop(0.5, `rgba(255,165,0,${pulse * 0.6})`);
  grd.addColorStop(1,   'rgba(208,2,27,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(weakPoint.x, weakPoint.y, weakPoint.r * 2.4, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#F8E71C';
  ctx.beginPath(); ctx.arc(weakPoint.x, weakPoint.y, weakPoint.r * 0.65 * pulse, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
}
function drawSkeleton() {
  const im = img.skeleton;
  const h = 95, w = h * (im.width / im.height);
  ctx.drawImage(im, unit.x - w / 2, unit.y - h * 0.55, w, h);
}
function drawRocket(p, ang) {
  const im = img.rocket;
  const h = 32, w = h * (im.width / im.height);
  ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(ang);
  ctx.drawImage(im, -w / 2, -h / 2, w, h);
  ctx.restore();
}
function drawTrajectory() {
  if (!drag) return;
  const dx = drag.sx - drag.x, dy = drag.sy - drag.y;
  const power = Math.min(Math.hypot(dx, dy) * 0.20, 24);
  const ang = Math.atan2(dy, dx);
  let vx = Math.cos(ang) * power, vy = Math.sin(ang) * power;
  let x = unit.x + 25, y = unit.y - 5;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1;
  for (let i = 0; i < 36; i++) {
    x += vx; y += vy; vy += GRAVITY;
    if (y > GROUND_Y + 5) break;
    if (i % 2 === 0) {
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    }
  }
}
function drawTutorialHand() {
  if (!firstShot || drag || phase !== 'aim') return;
  tutT += 0.05;
  const t = (Math.sin(tutT) + 1) / 2;
  const ex = unit.x - 70 * t, ey = unit.y + 35 * t;
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 3;
  ctx.setLineDash([4, 5]);
  ctx.beginPath(); ctx.moveTo(unit.x, unit.y); ctx.lineTo(ex, ey); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath(); ctx.arc(ex, ey, 14, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawChunks() {
  for (const c of chunks) {
    if (c.delay > 0) continue;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.drawImage(img.red, c.sx, c.sy, c.sw, c.sh, -c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }
}

// ---------- Update ----------
function update() {
  if (projectile) {
    const p = projectile;
    p.x += p.vx; p.y += p.vy; p.vy += GRAVITY;

    if (!enemy.destroyed && Math.hypot(p.x - weakPoint.x, p.y - weakPoint.y) < weakPoint.r + 10) {
      startCollapse();
      projectile = null;
      phase = 'win'; winTimer = 0;
    } else if (!enemy.destroyed &&
               p.x > enemy.cx - enemy.w / 2 && p.x < enemy.cx + enemy.w / 2 &&
               p.y > enemy.by - enemy.h && p.y < enemy.by) {
      spawnParticles(p.x, p.y, 20, {
        colors: ['#888','#aaa','#FFA500'],
        speedMin: 1, speedMax: 4, radius: 4
      });
      projectile = null; phase = 'miss';
      setTimeout(() => { if (phase === 'miss') { phase = 'aim'; firstShot = true; tutT = 0; } }, 900);
    } else if (p.x < -50 || p.x > W + 50 || p.y > GROUND_Y) {
      if (p.y > GROUND_Y) spawnParticles(p.x, GROUND_Y, 14, {
        colors: ['#7A5A3A','#9B7653'], speedMin: 1, speedMax: 3, radius: 3
      });
      projectile = null; phase = 'miss';
      setTimeout(() => { if (phase === 'miss') { phase = 'aim'; firstShot = true; tutT = 0; } }, 700);
    }
  }

  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += p.g; p.life--; }
  particles = particles.filter(p => p.life > 0);

  for (const c of chunks) {
    if (c.delay > 0) { c.delay--; continue; }
    c.x += c.vx; c.y += c.vy; c.vy += GRAVITY * 0.7;
    c.rot += c.vr;
    if (c.y + c.h / 2 > GROUND_Y) {
      c.y = GROUND_Y - c.h / 2; c.vy *= -0.3; c.vx *= 0.7; c.vr *= 0.6;
    }
  }

  if (phase === 'win') {
    winTimer++;
    if (winTimer === 50) {
      spawnParticles(enemy.cx, enemy.by - 30, 35, {
        colors: ['#F8E71C','#FFA500','#D0021B'],
        speedMin: 3, speedMax: 9, radius: 6
      });
      playSfx();
    }
    if (winTimer > 140) {
      phase = 'done';
      document.getElementById('endcard').classList.add('show');
    }
  }
}

// ---------- Render ----------
function render() {
  drawBackground();
  drawCastle(player, img.blue, false);
  drawCastle(enemy,  img.red,  true);
  drawChunks();
  drawWeakPoint();
  drawSkeleton();
  drawTrajectory();
  drawTutorialHand();
  if (projectile) {
    const ang = Math.atan2(projectile.vy, projectile.vx);
    drawRocket(projectile, ang);
  }
  drawParticles();

  if (phase === 'miss') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H / 2 - 38, W, 76);
    ctx.fillStyle = '#fff';
    ctx.font = '700 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Try again!', W / 2, H / 2 + 8);
  }
}

function loop() { update(); render(); requestAnimationFrame(loop); }

// ---------- Boot ----------
load().then(() => {
  document.getElementById('loader').remove();
  loop();
}).catch(err => {
  document.getElementById('loader').textContent = 'Asset load error: ' + err;
});

document.getElementById('cta').addEventListener('click', () => window.location.reload());
})();
</script>
</body>
</html>
