  // -------- viewport --------
  const W = 540, H = 960;
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  cv.width = W; cv.height = H;
  function fit() {
    const k = Math.min(window.innerWidth / W, window.innerHeight / H);
    cv.style.width = (W * k) + 'px';
    cv.style.height = (H * k) + 'px';
  }
  addEventListener('resize', fit); fit();

  // -------- state --------
  const ENEMIES_TO_WIN = 12;
  const PLAYER_HP_MAX = 3;
  const SPAWN_MS = 1100;
  const ENEMY_SPEED = 1.1;       // px/frame at 60fps
  const FLOOR_Y = H - 140;       // line where enemies "hit you"
  const TRAIL_LIFE = 220;        // ms a swipe segment stays "lethal"

  const state = {
    enemies: [],
    particles: [],
    trail: [],          // {x,y,t}
    playerHp: PLAYER_HP_MAX,
    kills: 0,
    nextSpawn: 0,
    started: false,
    over: false,        // 'win' | 'lose' | false
    shake: 0,
    t0: performance.now(),
  };

  // -------- helpers --------
  const rand = (a,b) => a + Math.random() * (b - a);
  const enemyTypes = [
    { color:'#e0413f', name:'orc',      r:34, hp:1 },
    { color:'#e8e6df', name:'skeleton', r:30, hp:1 },
    { color:'#7fc242', name:'cyclop',   r:38, hp:2 },
  ];

  function spawnEnemy(yStart) {
    const t = enemyTypes[Math.random()*enemyTypes.length|0];
    state.enemies.push({
      x: rand(80, W-80), y: yStart ?? 130,
      vx: rand(-0.3, 0.3), vy: ENEMY_SPEED + rand(0, 0.6),
      r: t.r, color: t.color, name: t.name, hp: t.hp,
      wob: Math.random()*6,
    });
  }
  // pre-spawn 2 teaser enemies at intro
  state.enemies.push({ x: 180, y: 280, vx:0, vy:0, r:34, color:'#e0413f', name:'orc', hp:1, wob:0 });
  state.enemies.push({ x: 380, y: 380, vx:0, vy:0, r:38, color:'#7fc242', name:'cyclop', hp:2, wob:1 });

  function spawnParticles(x, y, color, n=14) {
    for (let i=0;i<n;i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = rand(2, 6);
      state.particles.push({
        x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1,
        life: rand(300,650), born: performance.now(), color
      });
    }
  }

  // -------- input: swipe trail --------
  let pointerDown = false, lastP = null;
  function pointerEvt(x, y, type) {
    const r = cv.getBoundingClientRect();
    const px = (x - r.left) * (W / r.width);
    const py = (y - r.top) * (H / r.height);
    const now = performance.now();
    if (type === 'down') { pointerDown = true; lastP = {x:px, y:py}; if (!state.started) state.started = true; }
    else if (type === 'move' && pointerDown) {
      // sample segment
      if (lastP) {
        const dx = px - lastP.x, dy = py - lastP.y;
        const dist = Math.hypot(dx,dy);
        const steps = Math.max(1, dist/8|0);
        for (let i=1;i<=steps;i++) {
          state.trail.push({ x: lastP.x + dx*i/steps, y: lastP.y + dy*i/steps, t: now });
        }
        // collision with enemies
        for (const e of state.enemies) {
          if (e.hp <= 0) continue;
          const cx = lastP.x + dx*0.5, cy = lastP.y + dy*0.5;
          if (Math.hypot(e.x - cx, e.y - cy) < e.r + 6) {
            e.hp -= 1;
            if (e.hp <= 0) {
              spawnParticles(e.x, e.y, e.color, 18);
              state.kills += 1;
              state.shake = Math.max(state.shake, 6);
              if (state.kills >= ENEMIES_TO_WIN) state.over = 'win';
            }
          }
        }
      }
      lastP = {x:px, y:py};
    }
    else if (type === 'up') { pointerDown = false; lastP = null; }
  }
  cv.addEventListener('pointerdown', e => pointerEvt(e.clientX, e.clientY, 'down'));
  cv.addEventListener('pointermove', e => pointerEvt(e.clientX, e.clientY, 'move'));
  cv.addEventListener('pointerup',   e => pointerEvt(e.clientX, e.clientY, 'up'));
  cv.addEventListener('pointercancel', e => pointerEvt(e.clientX, e.clientY, 'up'));

  // -------- draw --------
  function drawCastleInterior() {
    // dark base
    ctx.fillStyle = '#1a1410'; ctx.fillRect(0,0,W,H);
    // brick pattern (offset rows)
    ctx.fillStyle = '#2a1d14';
    const bw = 60, bh = 30;
    for (let y = 60; y < FLOOR_Y; y += bh) {
      const off = ((y/bh)|0) % 2 ? bw/2 : 0;
      for (let x = -bw + off; x < W + bw; x += bw) {
        ctx.fillRect(x+2, y+2, bw-4, bh-4);
      }
    }
    // wood planks (horizontal floors)
    ctx.fillStyle = '#3a2812';
    for (let y = 240; y < H-160; y += 240) {
      ctx.fillRect(30, y, W-60, 16);
      ctx.fillStyle = '#5a3a1a'; ctx.fillRect(30, y, W-60, 3); ctx.fillStyle = '#3a2812';
    }
    // torches
    for (let i=0;i<2;i++) {
      const tx = i ? W-40 : 40, ty = 180;
      ctx.fillStyle = '#3a2010'; ctx.fillRect(tx-4, ty, 8, 60);
      const flick = Math.sin(performance.now()/120 + i*1.3)*3;
      const grad = ctx.createRadialGradient(tx, ty - 4, 0, tx, ty - 4, 60 + flick);
      grad.addColorStop(0, 'rgba(255,180,60,0.85)');
      grad.addColorStop(0.5, 'rgba(255,90,30,0.35)');
      grad.addColorStop(1, 'rgba(255,90,30,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(tx, ty - 4, 60 + flick, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffd075';
      ctx.beginPath(); ctx.ellipse(tx, ty - 8, 6, 12, 0, 0, Math.PI*2); ctx.fill();
    }
    // crenelations top
    ctx.fillStyle = '#0d0907';
    for (let i=0;i<8;i++) ctx.fillRect(40 + i*60, 0, 50, 24);
    // floor base
    ctx.fillStyle = '#3a2818'; ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);
    ctx.fillStyle = '#5a3a22'; ctx.fillRect(0, FLOOR_Y, W, 8);
  }

  function drawBlade() {
    // fixed blade UI hint at bottom — wiggles before user starts
    const t = performance.now() / 240;
    const bx = W/2 + Math.sin(t) * 60;
    const by = H - 60;
    const ang = Math.sin(t) * 0.4;
    ctx.save();
    ctx.translate(bx, by); ctx.rotate(ang);
    // blade
    const grd = ctx.createLinearGradient(-90,0, 90,0);
    grd.addColorStop(0,'#fff'); grd.addColorStop(1,'#cce6ff');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.moveTo(-90, 0); ctx.lineTo(60, -8); ctx.lineTo(70, 0); ctx.lineTo(60, 8); ctx.closePath(); ctx.fill();
    // hilt
    ctx.fillStyle = '#5a2a10'; ctx.fillRect(-100, -10, 12, 20);
    ctx.restore();
    // hand emoji-ish
    ctx.font = '48px serif'; ctx.textAlign = 'center';
    ctx.fillText('👆', bx + 70, by + 20);
  }

  function drawHud() {
    ctx.fillStyle = '#000c'; ctx.fillRect(0, 0, W, 86);
    if (blueCastle.complete) ctx.drawImage(blueCastle, 6, 6, 70, 70);
    if (redCastle.complete)  ctx.drawImage(redCastle,  W-76, 6, 70, 70);
    const eRatio = 1 - state.kills / ENEMIES_TO_WIN;
    ctx.fillStyle = '#33161a'; ctx.fillRect(W-260, 24, 180, 18);
    ctx.fillStyle = '#e0413f'; ctx.fillRect(W-260, 24, 180 * eRatio, 18);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(W-260, 24, 180, 18);
    const hp = state.playerHp / PLAYER_HP_MAX;
    ctx.fillStyle = '#152a3a'; ctx.fillRect(80, 24, 180, 18);
    ctx.fillStyle = '#4aa3ff'; ctx.fillRect(80, 24, 180 * hp, 18);
    ctx.strokeStyle = '#fff'; ctx.strokeRect(80, 24, 180, 18);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('VS', W/2, 38);
    ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'left';
    ctx.fillText(`${state.kills}/${ENEMIES_TO_WIN}`, 80, 60);
    ctx.textAlign = 'right';
    ctx.fillText(`HP ${state.playerHp}`, W-80, 60);
  }

  function drawTrail(now) {
    ctx.strokeStyle = '#fff'; ctx.lineCap = 'round';
    let prev = null;
    for (const p of state.trail) {
      const age = now - p.t;
      if (age > TRAIL_LIFE) continue;
      const a = 1 - age / TRAIL_LIFE;
      ctx.globalAlpha = a;
      ctx.lineWidth = 12 * a;
      if (prev) {
        ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      }
      prev = p;
    }
    ctx.globalAlpha = 1;
  }

  function drawEnemy(e) {
    const wob = Math.sin((performance.now()/180) + e.wob) * 3;
    // shadow
    ctx.fillStyle = '#0008';
    ctx.beginPath(); ctx.ellipse(e.x, e.y + e.r + 6, e.r*0.7, 6, 0, 0, Math.PI*2); ctx.fill();
    // body
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(e.x + wob*0.2, e.y, e.r, 0, Math.PI*2); ctx.fill();
    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(e.x - 8, e.y - 4, 5, 0, Math.PI*2);
    ctx.arc(e.x + 8, e.y - 4, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(e.x - 8, e.y - 4, 2.5, 0, Math.PI*2);
    ctx.arc(e.x + 8, e.y - 4, 2.5, 0, Math.PI*2); ctx.fill();
  }

  function drawParticle(p, now) {
    const age = now - p.born;
    if (age > p.life) return;
    const a = 1 - age / p.life;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawCenterText(top, bottom, color='#fff', yOffset=0) {
    const cy = H/2 + yOffset;
    ctx.fillStyle = '#000c'; ctx.fillRect(0, cy - 70, W, 130);
    ctx.textAlign = 'center';
    // glow
    ctx.shadowColor = color; ctx.shadowBlur = 20;
    ctx.fillStyle = color; ctx.font = 'bold 64px system-ui';
    ctx.fillText(top, W/2, cy);
    ctx.shadowBlur = 0;
    ctx.font = '18px system-ui'; ctx.fillStyle = '#ccc';
    ctx.fillText(bottom, W/2, cy + 36);
  }

  function drawIntro() {
    drawCenterText('SLICE!', 'swipe across enemies', '#ffb84d', -120);
  }

  // -------- loop --------
  function step() {
    const now = performance.now();
    // shake
    let shx = 0, shy = 0;
    if (state.shake > 0) { shx = rand(-state.shake, state.shake); shy = rand(-state.shake, state.shake); state.shake *= 0.85; }
    ctx.save();
    ctx.translate(shx, shy);

    drawCastleInterior();

    if (state.started && !state.over) {
      // unfreeze teaser enemies (give them velocity)
      for (const e of state.enemies) if (e.vy === 0 && e.y < FLOOR_Y) { e.vy = ENEMY_SPEED; e.vx = rand(-0.3, 0.3); }
      // spawn
      if (now > state.nextSpawn) { spawnEnemy(-40); state.nextSpawn = now + SPAWN_MS; }
      // update enemies
      for (const e of state.enemies) {
        e.x += e.vx; e.y += e.vy;
        if (e.x < 60) e.vx = Math.abs(e.vx);
        if (e.x > W-60) e.vx = -Math.abs(e.vx);
        if (e.y > FLOOR_Y - e.r && e.hp > 0) {
          e.hp = -1; // counted as escaped
          state.playerHp -= 1;
          state.shake = 12;
          spawnParticles(e.x, FLOOR_Y, '#4aa3ff', 22);
          if (state.playerHp <= 0) state.over = 'lose';
        }
      }
      state.enemies = state.enemies.filter(e => e.hp > 0 && e.y < H + 50);
    }

    // draw enemies
    for (const e of state.enemies) if (e.hp > 0) drawEnemy(e);

    // particles
    for (const p of state.particles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.18;
      drawParticle(p, now);
    }
    state.particles = state.particles.filter(p => now - p.born < p.life);

    // trail (slice line)
    state.trail = state.trail.filter(s => now - s.t < TRAIL_LIFE);
    drawTrail(now);

    // hud
    drawHud();

    if (!state.started) { drawBlade(); drawIntro(); }
    if (state.over === 'win')  { drawCenterText('VICTORY', '', '#ffd84a', -100); document.getElementById('cta').style.display='block'; }
    if (state.over === 'lose') { drawCenterText('DEFEAT',  '', '#ff5f5f', -100); document.getElementById('cta').style.display='block'; }

    ctx.restore();
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);

  // expose for tests
  window.__game = state;
})();
</script>
